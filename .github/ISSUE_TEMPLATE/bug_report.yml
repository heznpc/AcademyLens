name: Bug Report
description: Report a broken feature, UI issue, or translation failure.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: The page translated, but...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. Open https://academy.openai.com/...
        2. Select language ...
        3. Click Translate
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: page_type
    attributes:
      label: Academy Page Type
      description: Do not paste private course URLs, profile URLs, tokens, or full live paths.
      options:
        - Course list
        - Course detail
        - Study room
        - Lesson / SCORM content
        - Search or navigation
        - Extension popup
        - Extension floating panel
        - Other
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - German (de)
        - Spanish (es)
        - French (fr)
        - Hindi (hi)
        - Indonesian (id)
        - Italian (it)
        - Japanese (ja)
        - Korean (ko)
        - Portuguese Brazil (pt-BR)
        - Russian (ru)
        - Vietnamese (vi)
        - Chinese Simplified (zh-CN)
        - Chinese Traditional (zh-TW)
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser And OS
      placeholder: Chrome 126 on macOS 15
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots Or Console Output
      description: Optional. Redact account names, profile images, certificate/progress data, notifications, cookies, auth/session tokens, request headers, telemetry IDs, and full DOM dumps.
  - type: checkboxes
    id: privacy
    attributes:
      label: Public Report Privacy
      options:
        - label: I did not include private Academy URLs, account/profile data, course progress, certificates, notifications, cookies, auth/session tokens, request headers, telemetry IDs, or full DOM dumps.
          required: true
